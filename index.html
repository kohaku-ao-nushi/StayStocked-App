<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラソナ - 暮らしで備える。</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/additions.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5C6B7A">
  <!-- iOS ホーム画面追加サポート -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="クラソナ">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/favicon.ico">
</head>
<body>

  <header class="app-header" id="app-header">
    <h1 id="header-title" class="app-header__title">クラソナ</h1>
  </header>

  <main id="app-root" class="app-main"></main>

  <nav class="bottom-nav" id="bottom-nav">
    <a href="#home"      class="bottom-nav__item">
      <img src="icons/menu.png" alt="">
      <span>ホーム</span>
    </a>
    <a href="#lifestyle" class="bottom-nav__item">
      <img src="icons/family.png" alt="">
      <span>くらし方</span>
    </a>
    <a href="#stock"     class="bottom-nav__item">
      <img src="icons/stock.png" alt="">
      <span>備蓄リスト</span>
    </a>
    <a href="#settings"  class="bottom-nav__item">
      <img src="icons/setting.png" alt="">
      <span>設定</span>
    </a>
  </nav>

  <script src="js/main.js" type="module"></script>
  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>

</body>
</html>
