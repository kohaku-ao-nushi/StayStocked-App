<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayStocked - 防災備蓄管理</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA対応（将来用）
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d7a4f">
  -->
  <link rel="icon" href="icons/favicon.ico">
</head>
<body>

  <!-- ヘッダー：ページタイトルだけ。JSが動的に書き換える -->
  <header class="app-header">
    <h1 id="header-title" class="app-header__title">StayStocked</h1>
  </header>

  <!-- メインコンテンツ：JSがここにページのHTMLを差し込む -->
  <main id="app-root" class="app-main"></main>

  <!-- ボトムナビゲーション -->
  <nav class="bottom-nav">
    <a href="#home"      class="bottom-nav__item">
      <img src="icons/lifestyle.png" alt="">
      <span>ホーム</span>
    </a>
    <a href="#lifestyle" class="bottom-nav__item">
      <img src="icons/suggest.png" alt="">
      <span>くらし方</span>
    </a>
    <a href="#stock"     class="bottom-nav__item">
      <img src="icons/stock.png" alt="">
      <span>備蓄リスト</span>
    </a>
    <a href="#settings"  class="bottom-nav__item">
      <img src="icons/setting.png" alt="">
      <span>設定</span>
    </a>
  </nav>

  <!-- type="module" を指定することでESモジュール（import/export）が使える -->
  <script src="js/main.js" type="module"></script>

</body>
</html>
