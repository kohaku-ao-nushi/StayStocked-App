<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>防災備蓄アプリ bosaistock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA対応のためのマニフェストファイル（将来用） -->
  <!-- <link rel="manifest" href="manifest.json"> -->
</head>
<body>

  <!-- ▼▼▼ アプリの共通ヘッダー ▼▼▼ -->
  <header>
    <h1 id="header-title">bosaistock</h1>
  </header>
  <!-- ▲▲▲ アプリの共通ヘッダー ▲▲▲ -->

  <!-- ▼▼▼ 各ページのコンテンツはここに描画される ▼▼▼ -->
  <main id="app-root" class="container">
    <!-- JavaScriptによって内容が動的に変わる -->
  </main>
  <!-- ▲▲▲ 各ページのコンテンツはここに描画される ▲▲▲ -->


  <!-- ▼▼▼ アプリの共通フッターナビゲーション ▼▼▼ -->
  <nav class="bottom-nav">
    <a href="#home"><img src="icons/home.png" alt="ホーム"><div>ホーム</div></a>
    <a href="#suggest"><img src="icons/todo.png" alt="備蓄提案"><div>備蓄提案</div></a>
    <a href="#stock"><img src="icons/stock.png" alt="備蓄管理"><div>備蓄管理</div></a>
    <a href="#settings"><img src="icons/setting.png" alt="家族設定"><div>家族設定</div></a>
  </nav>
  <!-- ▲▲▲ アプリの共通フッターナビゲーション ▲▲▲ -->

  <!-- アプリの動作に必要なJavaScriptはこれ一つだけ -->
  <script src="js/main.js" type="module"></script>
</body>
</html>
