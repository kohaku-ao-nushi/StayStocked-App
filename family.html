<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家族構成（個別入力）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #fef9f5; font-family: sans-serif; }
    .container { max-width: 480px; margin: auto; padding: 16px; }
    .number-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0; }
    .number-btn {
      background-color: #fff;
      border: 2px solid #4a6fa5;
      border-radius: 50%;
      padding: 12px 0;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #4a6fa5;
      cursor: pointer;
    }
    .number-btn.active {
      background-color: #4a6fa5;
      color: #fff;
    }
    .profile-card {
      background-color: #fff;
      border-left: 4px solid #4a6fa5;
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background-color: #4a6fa5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 16px;
    }
  </style>
  <script>
    function selectNumber(n) {
      const buttons = document.querySelectorAll(".number-btn");
      buttons.forEach(btn => btn.classList.remove("active"));
      buttons[n-1].classList.add("active");

      const container = document.getElementById("profiles");
      container.innerHTML = "";
      for (let i = 1; i <= n; i++) {
        container.innerHTML += `
          <div class="profile-card">
            <h3>${i}人目の性別・年代</h3>
            <div class="form-group">
              <label>性別</label>
              <select class="gender">
                <option value="男性">男性</option>
                <option value="女性">女性</option>
              </select>
            </div>
            <div class="form-group">
              <label>年代</label>
              <select class="age-group">
                <option value="乳幼児">乳幼児（0-2歳）</option>
                <option value="子供">子供（3歳〜小6）</option>
                <option value="中高生">子供（中学生以上）</option>
                <option value="成人">成人（18歳以上）</option>
                <option value="高齢者">高齢者（65歳以上）</option>
              </select>
            </div>
          </div>
        `;
      }
    }

    function saveFamilyProfiles() {
      const genders = document.querySelectorAll(".gender");
      const ages = document.querySelectorAll(".age-group");
      const profiles = [];

      for (let i = 0; i < genders.length; i++) {
        profiles.push({
          gender: genders[i].value,
          ageGroup: ages[i].value
        });
      }

      localStorage.setItem("familyProfiles", JSON.stringify(profiles));
      alert("家族構成を保存しました！");
    }
  </script>
</head>
<body>
  <header>家族構成</header>
  <div class="container">
    <p>一緒に住んでいる人数を選んでください：</p>
    <div class="number-pad">
      <div class="number-btn" onclick="selectNumber(1)">1</div>
      <div class="number-btn" onclick="selectNumber(2)">2</div>
      <div class="number-btn" onclick="selectNumber(3)">3</div>
      <div class="number-btn" onclick="selectNumber(4)">4</div>
      <div class="number-btn" onclick="selectNumber(5)">5</div>
      <div class="number-btn" onclick="selectNumber(6)">6</div>
      <div class="number-btn" onclick="selectNumber(7)">7</div>
      <div class="number-btn" onclick="selectNumber(8)">8</div>
      <div class="number-btn" onclick="selectNumber(9)">9</div>
    </div>

    <div id="profiles"></div>
    <button class="btn" onclick="saveFamilyProfiles()">保存する</button>
  </div>
</body>
</html>
