<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>備蓄品登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>備蓄品を登録</h1>
  <label>品名<input type="text" id="itemName"></label>
  <label>数量<input type="number" id="itemQty" min="1" value="1"></label>
  <label>賞味期限<input type="date" id="itemExpiry"></label>
  <label>カテゴリ
    <select id="itemCategory">
      <option value="food">食料</option>
      <option value="hygiene">衛生</option>
      <option value="medicine">医薬品</option>
      <option value="pet">ペット用品</option>
    </select>
  </label>
  <label>対象:
    <input type="radio" name="target" value="human" checked>人
    <input type="radio" name="target" value="pet">ペット
  </label>
  <button onclick="saveItem()">＋ 登録する</button>
  <a href="index.html">← 戻る</a>

  <script src="js/storage.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
